# Prolific → Slack notifier: triggered every 5 min by cron-job.org (no Mac needed)
name: Prolific Slack Notifier
on:
  workflow_dispatch:   # triggered by cron-job.org every 5 min (or manually from Actions tab)
permissions:
  contents: write
jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Prolific notifier
        env:
          PROLIFIC_API_TOKEN: ${{ secrets.PROLIFIC_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 "Prolific Slack Notifier.py"

      - name: Save state for next run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .prolific_seen_studies.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "Update notifier state [skip ci]" && git push)
