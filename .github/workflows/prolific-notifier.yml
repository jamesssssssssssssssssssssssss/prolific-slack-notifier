# Prolific → Slack notifier: runs every 5 minutes in the cloud (no Mac needed)
name: Prolific Slack Notifier
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may not run every 1 min)
  workflow_dispatch:          # allows manual "Run workflow" from GitHub UI
permissions:
  contents: write             # so we can push state file back
jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Prolific notifier
        env:
          PROLIFIC_API_TOKEN: ${{ secrets.PROLIFIC_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 "Prolific Slack Notifier.py"

      - name: Save state for next run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .prolific_seen_studies.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "Update notifier state [skip ci]" && git push)
